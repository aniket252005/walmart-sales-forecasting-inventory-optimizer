project:
  name: "Walmart Sales Forecasting & Inventory Optimization"
  version: "1.0.0"
  author: "Aniket"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  raw_filename: "train.csv"
  processed_filename: "sales_processed.csv"
  features_filename: "sales_features.csv"

preprocessing:
  date_column: "Date"
  target_column: "Weekly_Sales"
  resample_frequency: "W"  # Weekly
  missing_value_strategy: "forward_fill"
  outlier_method: "iqr"   # 'iqr' or 'zscore'
  iqr_multiplier: 1.5
  zscore_threshold: 3.0

features:
  lag_periods: [7, 14, 30]
  rolling_windows: [4, 8, 13]  # in weeks
  service_level: 0.95           # 95% → Z = 1.65

models:
  train_test_split_ratio: 0.8
  n_cv_folds: 5
  random_state: 42
  arima:
    max_p: 5
    max_d: 2
    max_q: 5
    seasonal: true
    m: 52   # 52 weeks per year
  prophet:
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    interval_width: 0.95
  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    n_jobs: -1
  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8

inventory:
  default_lead_time_days: 7
  order_cost: 50.0
  holding_cost_rate: 0.25
  default_unit_cost: 10.0
  working_days_per_year: 365

forecast:
  horizon_days: 90

output:
  models_dir: "outputs/models"
  forecasts_dir: "outputs/forecasts"
  reports_dir: "outputs/reports"
  dashboards_dir: "outputs/dashboards"

logging:
  level: "INFO"
  log_file: "outputs/pipeline.log"
